[package]
name = "nc-gcode-interpreter"
version = "0.0.0-dev"
edition = "2021"

[lib]
name = "nc_gcode_interpreter"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "nc-gcode-interpreter"
path = "src/main.rs"

[dependencies]
csv = "1.3.1"
pest = "2.8.1"
pest_derive = "2.8.1"
thiserror = "2.0.16"
clap = { version = "4.5", features = ["derive"] }
polars = { version = "0.50.0", features = ["csv"] }

[dependencies.pyo3]
version = "0.25"
optional = true

[dependencies.pyo3-polars]
version = "0.23.1"
optional = true

[features]
default = []
python = ["pyo3", "pyo3-polars"]

