[package]
name = "nc-gcode-interpreter"
version = "0.0.0-dev"
edition = "2021"

[lib]
name = "nc_gcode_interpreter"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "nc-gcode-interpreter"
path = "src/main.rs"

[dependencies]
csv = "1.4.0"
pest = "2.8.6"
pest_derive = "2.8.6"
thiserror = "2.0.18"
clap = { version = "4.6", features = ["derive"] }
polars = { version = "0.54.4", features = ["csv"] }

[dependencies.pyo3]
version = "0.28"
optional = true

[dependencies.pyo3-polars]
version = "0.27.0"
optional = true

[features]
default = []
python = ["pyo3", "pyo3-polars"]

